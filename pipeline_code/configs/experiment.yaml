# Experiment configuration
# Passed to src/harness/runner.py

# ── Environment ─────────────────────────────────────────────────────────────
env_name: retail          # "retail" (primary) or "airline" (stretch)
task_split: test
start_index: 0
end_index: 10             # set to null for full test split (~115 tasks)
seeds: [42]               # add more seeds (e.g. [42, 7, 123]) for pass^k

# ── Main agent (used by ALL methods except where overridden) ─────────────────
model: gpt-5.4-nano          # 범용 task 처리 (cheaper, faster)
model_provider: openai

# ── Critic (used by Ours) ────────────────────────────────────────────────────
critic_model: gpt-5.4-mini   # mutating action 판정 (stronger, fewer calls)

# ── Oracle label file (P2 provides) ─────────────────────────────────────────
# Path is relative to pipeline_code/ (the CWD when runner is launched); the
# labels live at repo-root/data/labels, i.e. ../data/labels from here.
oracle_label_file: ../data/labels/perturbations.jsonl

# ── User simulator (tau-bench) ───────────────────────────────────────────────
# Stronger user-sim (closest practical stand-in for the paper's claude-sonnet-4).
# Its API calls use OPENAI_USER_SIM_API_KEY (separate from the agent/critic key)
# when that env var is set — see the user-sim patch in src/harness/runner.py.
user:
  strategy: react          # tau-bench user strategy ("react" or "llm")
  model: gpt-5.4
  provider: openai

# ── Output ──────────────────────────────────────────────────────────────────
output_dir: data/results

# ── Methods to run ───────────────────────────────────────────────────────────
# Each entry maps to get_agent(name, ...) in src/agents/__init__.py
methods:
  - name: vanilla

  - name: ours
    critic_model: gpt-5.4-mini
    enable_rollback: false

  # SABER = faithful reproduction (Cuadron et al. 2025): mutation-gated USER
  # verification (routes confirmation to the tau-bench user simulator) + targeted
  # reflection. aux_model defaults to the main model (same-model pairing = paper default).
  - name: saber
    # aux_model: gpt-5.4-nano

  # SABER+Block = full SABER (mechanisms 1+2+3): adds block-based context cleaning
  # (summarize older rounds + embedding retrieval of top-16) on top of SABER.
  - name: saber_block
    # aux_model: gpt-5.4-nano

  # Old SABER = original simplified baseline (autonomous 4-way LLM critic, never
  # reaches the user). Kept for reference / ablation only.
  - name: saber_old

  - name: reflexion
    max_reflections: 3

  - name: oracle
    label_file: ../data/labels/perturbations.jsonl

